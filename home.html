<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classificação — Bolão Shuriks</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#FF2E9A;--gold-light:#FF6FC0;--gold-dark:#C01878;
  --bg:#0a0c10;--bg2:#12151c;--bg3:#1a1e28;--bg4:#222738;
  --border:rgba(255,46,154,0.18);--border-strong:rgba(255,46,154,0.4);
  --text:#f0f0f0;--text-muted:#8892a4;--text-dim:#555f72;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.site-header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:960px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:58px}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-img{width:38px;height:38px;border-radius:50%;object-fit:cover}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--gold)}
nav{display:flex;gap:2px}
nav a{color:var(--text-muted);text-decoration:none;font-size:11px;font-weight:600;padding:6px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
nav a:hover,nav a.active{color:var(--gold);background:rgba(255,46,154,0.08)}
nav a.nav-bolao{border:1px solid var(--border);color:var(--gold)}

.hero{background:var(--bg2);border-bottom:1px solid var(--border);padding:26px 20px 24px;text-align:center}
.hero-logo{width:88px;height:88px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block;filter:drop-shadow(0 0 26px rgba(255,46,154,.4))}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(34px,7vw,58px);letter-spacing:3px;color:var(--gold);line-height:1}

.main{max-width:860px;margin:0 auto;padding:26px 16px 60px}

/* PÓDIO */
.podio{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:8px;align-items:end;margin-bottom:30px}
.pod{background:linear-gradient(165deg,rgba(255,46,154,.07),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:16px 8px;text-align:center;position:relative;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s}
.pod:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.pod .av{width:56px;height:56px;border-radius:50%;background:var(--bg4);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;overflow:hidden;border:2px solid var(--border)}
.pod .av img{width:100%;height:100%;object-fit:cover}
.pod .medal{font-size:26px;line-height:1;margin-bottom:4px}
.pod .nome{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod .pts{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);line-height:1.1}
.pod.p1{border-color:var(--gold);box-shadow:0 0 24px rgba(255,46,154,.18)}
.pod.p1 .av{border-color:var(--gold);width:64px;height:64px}
.pod.p1 .pts{font-size:32px}

.sec-head{display:flex;justify-content:space-between;align-items:center;margin:26px 0 12px}
.sec-title{font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:3px;height:18px;background:var(--gold);border-radius:2px}
.sec-info{font-size:12px;color:var(--text-muted)}

.ranking{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.row{display:grid;grid-template-columns:46px auto 1fr auto 20px;align-items:center;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .12s}
.row:hover{background:rgba(255,46,154,.05)}
.row-seta{color:var(--text-dim);font-size:22px;text-align:center}
.row:last-child{border:none}
.row.p1{background:linear-gradient(90deg,rgba(255,46,154,.07),transparent)}
.pos{font-family:'Bebas Neue',sans-serif;font-size:22px;text-align:center;color:var(--text-dim);padding:15px 0}
.row.p1 .pos{color:var(--gold)}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold);font-size:13px;overflow:hidden;margin:0 4px}
.avatar img{width:100%;height:100%;object-fit:cover}
.nome{font-family:'Oswald',sans-serif;font-size:15px;font-weight:500;padding:15px 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nome small{display:block;font-family:'Inter',sans-serif;font-size:11px;color:var(--text-muted);font-weight:400}
.pts-wrap{text-align:right;padding:15px 18px 15px 10px}
.pts{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);line-height:1}
.pts-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}

/* CAMPEÃO DA RODADA */
.rod-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.rod-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.rod-card .r-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.rod-card .r-win{display:flex;align-items:center;gap:9px}
.rod-card .r-av{width:34px;height:34px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:12px;font-family:'Oswald',sans-serif;overflow:hidden}
.rod-card .r-av img{width:100%;height:100%;object-fit:cover}
.rod-card .r-nome{font-size:13px;font-weight:600}
.rod-card .r-pts{font-size:11px;color:var(--gold)}
.rod-card.vazia{opacity:.5}

/* DESTAQUES */
.dest-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px}
.dest-ico{font-size:30px;line-height:1}
.dest-info{min-width:0}
.dest-tit{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.dest-win{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.dest-av{width:30px;height:30px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:11px;font-family:'Oswald',sans-serif;overflow:hidden;flex-shrink:0}
.dest-av img{width:100%;height:100%;object-fit:cover}
.dest-val{font-size:11px;color:var(--gold);margin-top:3px}

/* GRÁFICO */
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 14px}
.chart-wrap svg{width:100%;height:auto;display:block}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;justify-content:center}
.legend span{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted)}
.legend i{width:11px;height:3px;border-radius:2px;display:inline-block}

.loading{text-align:center;padding:60px 20px;color:var(--text-muted)}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--text-muted);padding:24px;font-size:13px}
footer{border-top:1px solid var(--border);text-align:center;padding:24px;font-size:12px;color:var(--text-dim)}
@media(max-width:520px){.row{grid-template-columns:38px auto 1fr auto 16px}.pts{font-size:24px}.nome{font-size:14px}.header-inner{height:auto;flex-wrap:wrap;padding:8px 16px;row-gap:6px}nav{width:100%;justify-content:space-between;gap:3px;overflow-x:auto}nav a{padding:6px 6px;font-size:10.5px;white-space:nowrap}}

/* MODAL DE PERFIL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:5vh 14px;overflow-y:auto}
.modal.open{display:flex}
.modal-card{background:var(--bg2);border:1px solid var(--border-strong);border-radius:18px;width:100%;max-width:480px;padding:22px;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.55)}
.modal-x{position:absolute;top:12px;right:14px;background:var(--bg4);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;font-size:20px;cursor:pointer;line-height:1}
.pf-head{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-right:30px}
.pf-av{width:60px;height:60px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold);font-size:20px;overflow:hidden;border:2px solid var(--border);flex-shrink:0}
.pf-av img{width:100%;height:100%;object-fit:cover}
.pf-id{flex:1;min-width:0}
.pf-pos{font-size:11px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
.pf-nome{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;line-height:1.1}
.pf-time{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:5px;margin-top:2px}
.pf-time .fl{width:16px;border-radius:2px}
.pf-total{text-align:center;flex-shrink:0}
.pf-tn{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--gold);line-height:.9}
.pf-tl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.pf-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.pf-st{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.pf-st b{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);display:block;line-height:1}
.pf-st span{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}
.pf-sec{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:10px}
.pf-lista{display:flex;flex-direction:column;gap:8px;max-height:46vh;overflow-y:auto}
.pf-jogo{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.pf-jt{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;margin-bottom:5px}
.pf-jt .fl{width:18px;border-radius:2px}
.pf-jt em{color:var(--text-dim);font-style:normal;margin:0 2px}
.pf-info{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;color:var(--text-muted);flex-wrap:wrap}
.pf-info strong{color:var(--text)}
.bdg{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.bdg.ok{background:rgba(34,197,94,.15);color:#5fe08a}
.bdg.meio{background:rgba(255,46,154,.15);color:var(--gold-light)}
.bdg.zero{background:rgba(136,146,164,.15);color:var(--text-muted)}
.bdg.cf,.bdg.ag{background:rgba(245,180,40,.14);color:#f5c453}
.pf-vazio{font-size:13px;color:var(--text-muted);text-align:center;padding:20px;line-height:1.5}
/* CARTA estilo figurinha */
.pf-top{display:flex;gap:16px;margin-bottom:18px;padding-right:26px}
.pf-carta{width:142px;flex-shrink:0;border-radius:14px;padding:10px;text-align:center;background:linear-gradient(160deg,rgba(255,46,154,.16),rgba(26,10,20,.6)),var(--bg3);border:2px solid var(--gold);position:relative;box-shadow:0 0 26px rgba(255,46,154,.22),inset 0 1px 0 rgba(255,111,192,.25)}
.pf-carta-top{display:flex;justify-content:space-between;align-items:center;height:26px;margin-bottom:6px}
.pf-carta-pos{font-family:'Bebas Neue',sans-serif;font-size:23px;color:var(--gold);line-height:1}
.pf-carta-flag img{width:27px;border-radius:2px;display:block}
.pf-carta-foto{width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg4);display:flex;align-items:center;justify-content:center;border:1px solid var(--border-strong)}
.pf-carta-foto img{width:100%;height:100%;object-fit:cover}
.pf-carta-foto .ini{font-family:'Oswald',sans-serif;font-weight:700;font-size:44px;color:var(--gold)}
.pf-carta-stars{color:var(--gold-light);font-size:12px;letter-spacing:3px;margin:7px 0 1px}
.pf-carta-nome{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.4px;line-height:1.15;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pf-carta-pts{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold);line-height:1;margin-top:2px}
.pf-carta-pts span{font-size:12px;color:var(--text-muted);letter-spacing:1px}
.pf-side{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.pf-side .pf-pos{margin-bottom:5px}
.pf-side .pf-time{margin-bottom:12px}
.pf-side .pf-stats{margin-bottom:0;grid-template-columns:repeat(2,1fr)}
@media(max-width:480px){.pf-top{flex-direction:column;align-items:center;padding-right:0}.pf-carta{width:165px}.pf-side{width:100%}.pf-side .pf-pos,.pf-side .pf-time{text-align:center;justify-content:center}}
</style>
</head>

  <div class="header-inner">
    <a class="logo" href="home.html"><img class="logo-img" src="shuriks-logo.png" alt="Shuriks"><div class="logo-text" id="logo-text">Bolão Shuriks</div></a>
    <nav>
      <a href="inicio.html" class="nav-opt">🏠 Início</a>
      <a href="home.html" class="active">Classif.</a>
      <a href="index.html" class="nav-bolao">⚽ Bolão</a>
      <a href="palpites.html" class="nav-opt">🎯 Palpites</a>
      <a href="stats.html" class="nav-opt">📊 Stats</a>
      <a href="perfil.html" class="nav-opt">👤 Perfil</a>
    </nav>
  </div>
</header>

<section class="hero">
  <img class="hero-logo" src="shuriks-logo.png" alt="Shuriks">
  <div class="hero-eyebrow">Classificação Geral</div>
  <div class="hero-title" id="hero-title">Bolão Shuriks</div>
</section>

<div class="main">
  <div id="loading" class="loading"><div class="spinner"></div>Carregando classificação...</div>
  <div id="conteudo" style="display:none">

    <div id="podio" class="podio"></div>

    <div class="sec-head"><div class="sec-title">Ranking geral</div><div class="sec-info" id="sec-info"></div></div>
    <div class="ranking" id="ranking"></div>

    <div class="sec-head" style="margin-top:30px"><div class="sec-title">Campeão de cada rodada</div></div>
    <div class="rod-grid" id="rodadas"></div>

    <div class="sec-head" style="margin-top:30px"><div class="sec-title">Destaques da galera</div></div>

  <div class="modal-card">
    <button class="modal-x" id="pf-x" onclick="fecharPerfil(event)">×</button>
    <div id="pf-corpo"></div>
  </div>
</div>

<script src="medals.js"></script>
<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyr5fXwBeGQKntrZv4L6WjkCSCYG5d3rlIrV85_i_wO_VZpb-SVhRmub7aVYCj0KPMDtA/exec';
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fotoSafe(f){f=String(f||'');return /^data:image\//.test(f)||/^https:\/\//.test(f)?f:'';}
function initials(n){const p=String(n||'').trim().split(' ');return ((p[0][0]||'?')+(p[1]?p[1][0]:'')).toUpperCase();}
function nomeCurto(n){const p=String(n||'').trim().split(' ');return p[0]+(p.length>1?' '+p[p.length-1]:'');}
function nc(n){return esc(nomeCurto(n));}
function av(p){const f=fotoSafe(p.foto);return f?`<img src="${f}">`:esc(initials(p.nome));}
const FLAGS={'México':'mx','África do Sul':'za','Coreia do Sul':'kr','Canadá':'ca','Estados Unidos':'us','Paraguai':'py','Austrália':'au','Catar':'qa','Suíça':'ch','Brasil':'br','Marrocos':'ma','Haiti':'ht','Escócia':'gb-sct','Alemanha':'de','Curaçao':'cw','Holanda':'nl','Japão':'jp','Costa do Marfim':'ci','Equador':'ec','Tunísia':'tn','Espanha':'es','Cabo Verde':'cv','Bélgica':'be','Egito':'eg','Arábia Saudita':'sa','Uruguai':'uy','Irã':'ir','Nova Zelândia':'nz','Argentina':'ar','Argélia':'dz','França':'fr','Senegal':'sn','Noruega':'no','Áustria':'at','Jordânia':'jo','Portugal':'pt','Inglaterra':'gb-eng','Croácia':'hr','Gana':'gh','Panamá':'pa','Uzbequistão':'uz','Colômbia':'co','Tchéquia':'cz','Bósnia e Herzegovina':'ba','Turquia':'tr','Suécia':'se','Iraque':'iq','RD Congo':'cd'};
function flag(t){const c=FLAGS[(t||'').trim()];return c?`<img class="fl" src="https://flagcdn.com/w20/${c}.png">`:'';}
function dir(a,b){return a>b?1:b>a?2:0;}

let PARTICIPANTES=[], PALPITES=[], JOGOS=[], CUTOFF=1;

function render(){
  const lista = PARTICIPANTES;
  // pódio
  const medals=['🥇','🥈','🥉'];
  const ordem=[1,0,2]; // 2º, 1º, 3º (1º no meio)
  document.getElementById('podio').innerHTML = ordem.map(idx=>{
    const p=lista[idx]; if(!p) return '<div></div>';
    return `<div class="pod p${idx+1}" onclick="abrirPerfil(${idx})">
      <div class="medal">${medals[idx]}</div>
      <div class="av">${av(p)}</div>
      <div class="nome">${nc(p.nome)}</div>
      <div class="pts">${p.pontos}</div>
    </div>`;
  }).join('');

  // ranking
  document.getElementById('ranking').innerHTML = lista.map((p,i)=>`
    <div class="row p${i+1}" onclick="abrirPerfil(${i})">
      <div class="pos">${medals[i]||(i+1)+'º'}</div>
      <div class="avatar">${av(p)}</div>
      <div class="nome">${nc(p.nome)}<small>${p.cravadas||0} cravada(s) · ${p.aproveitamento||0}% aprov.</small></div>
      <div class="pts-wrap"><div class="pts">${p.pontos}</div><div class="pts-lbl">pontos</div></div>
      <div class="row-seta">›</div>
    </div>`).join('');
  document.getElementById('sec-info').textContent = lista.length+' participantes';

  renderRodadas(lista);
  renderChart(lista);
  renderDestaques(lista);
}

// ── MODAL DE PERFIL (clica numa pessoa da classificação) ──
function abrirPerfil(idx){
  const p=PARTICIPANTES[idx]; if(!p)return;
  const pos=idx+1;
  const medalha=['🥇','🥈','🥉'][idx]||(pos+'º');
  const jn={}; JOGOS.forEach(j=>jn[String(j.num)]=j);

  // jogos válidos (que contam) que a pessoa palpitou, em ordem
  const meus=PALPITES.filter(pl=>pl.nome===p.nome)
    .filter(pl=>{const j=jn[String(pl.jogo)];return j && !pl.oculto && Number(j.num)>=CUTOFF;})
    .sort((a,b)=>Number(a.jogo)-Number(b.jogo));

  let linhas='';
  meus.forEach(pl=>{
    const j=jn[String(pl.jogo)];
    const fim=(j.placar1!==null&&j.placar2!==null);
    let badge;
    if(!fim){
      badge='<span class="bdg ag">⏳ Aguardando</span>';
    }else if(!j.confirmado){
      badge='<span class="bdg cf">⏳ A confirmar</span>';
    }else{
      const exato=(pl.gol1===j.placar1&&pl.gol2===j.placar2);
      const result=(dir(pl.gol1,pl.gol2)===dir(j.placar1,j.placar2));
      if(exato) badge=`<span class="bdg ok">🎯 Placar exato +${pl.pontos}</span>`;
      else if(pl.pontos>0&&result) badge=`<span class="bdg ok">✅ Resultado certo +${pl.pontos}</span>`;
      else if(pl.pontos>0) badge=`<span class="bdg meio">➕ Acertou gols +${pl.pontos}</span>`;
      else badge='<span class="bdg zero">✗ 0 pts</span>';
    }
    const res=fim?`Resultado: <strong>${j.placar1} × ${j.placar2}</strong>`:'<span style="color:var(--text-dim)">ainda não rolou</span>';
    linhas+=`<div class="pf-jogo">
      <div class="pf-jt">${flag(j.time1)}<span>${esc(j.time1)}</span> <em>×</em> ${flag(j.time2)}<span>${esc(j.time2)}</span></div>
      <div class="pf-info"><span>Jogo ${j.num} · seu palpite: <strong>${pl.gol1} × ${pl.gol2}</strong> · ${res}</span>${badge}</div>
    </div>`;
  });
  if(!linhas) linhas='<div class="pf-vazio">Os pontos contam a partir do jogo 25 (18/06). Quando os jogos válidos forem confirmados, o detalhamento aparece aqui.</div>';

  const torcida=p.time?`${flag(p.time)} <span>${esc(p.time)}</span>`:'';
  const nf=Math.max(1,Math.min(5,Math.round((p.aproveitamento||0)/20)));
  const stars='★'.repeat(nf)+'☆'.repeat(5-nf);
  const fotoCard=fotoSafe(p.foto)?`<img src="${fotoSafe(p.foto)}">`:`<div class="ini">${esc(initials(p.nome))}</div>`;
  document.getElementById('pf-corpo').innerHTML=`
    <div class="pf-top">
      <div class="pf-carta">
        <div class="pf-carta-top"><span class="pf-carta-pos">${pos}º</span><span class="pf-carta-flag">${p.time?flag(p.time):''}</span></div>
        <div class="pf-carta-foto">${fotoCard}</div>
        <div class="pf-carta-stars">${stars}</div>
        <div class="pf-carta-nome">${nc(p.nome)}</div>
        <div class="pf-carta-pts">${p.pontos}<span>pts</span></div>
      </div>
      <div class="pf-side">
        <div class="pf-pos">${medalha} ${pos}º lugar</div>
        ${torcida?`<div class="pf-time">${torcida}</div>`:''}
        <div class="pf-stats">
          <div class="pf-st"><b>${p.pontos}</b><span>pontos</span></div>
          <div class="pf-st"><b>${p.cravadas||0}</b><span>cravadas</span></div>
          <div class="pf-st"><b>${p.acertos||0}</b><span>acertos</span></div>
          <div class="pf-st"><b>${p.aproveitamento||0}%</b><span>aproveit.</span></div>
        </div>
      </div>
    </div>
    <div class="pf-sec">Onde pontuou</div>
    <div class="pf-lista">${linhas}</div>`;
  document.getElementById('modal-perfil').classList.add('open');
}
function fecharPerfil(e){
  if(e&&e.target.id!=='modal-perfil'&&e.target.id!=='pf-x')return;
  document.getElementById('modal-perfil').classList.remove('open');
}

function renderDestaques(lista){
  if(typeof calcularDestaques!=='function'){return;}
  const ctx=buildMedalCtx(lista,PALPITES,JOGOS,CUTOFF);
  const dest=calcularDestaques(lista,PALPITES,JOGOS,ctx);
  const el=document.getElementById('destaques');
  if(!dest.length){el.innerHTML='<div class="empty">Os destaques aparecem conforme a galera for palpitando e pontuando.</div>';return;}
  el.innerHTML=dest.map(d=>{
    const fav={foto:d.foto,nome:d.nome};
    return `<div class="dest-card"><div class="dest-ico">${d.ico}</div>
      <div class="dest-info"><div class="dest-tit">${esc(d.titulo)}</div>
        <div class="dest-win"><div class="dest-av">${av(fav)}</div><span>${nc(d.nome)}</span></div>
        <div class="dest-val">${esc(d.valor)}</div></div></div>`;
  }).join('');
}

function renderRodadas(lista){
  const out=[];
  for(let r=1;r<=3;r++){
    let melhor=null;
    lista.forEach(p=>{const v=(p.rodada&&p.rodada[r])||0; if(v>0 && (!melhor||v>melhor.v)) melhor={p,v};});
    if(melhor){
      out.push(`<div class="rod-card"><div class="r-lbl">Rodada ${r}</div>
        <div class="r-win"><div class="r-av">${av(melhor.p)}</div>
        <div><div class="r-nome">${nc(melhor.p.nome)}</div><div class="r-pts">${melhor.v} pts na rodada</div></div></div></div>`);
    } else {
      out.push(`<div class="rod-card vazia"><div class="r-lbl">Rodada ${r}</div><div class="r-win"><div class="r-nome" style="color:var(--text-muted)">Ainda sem pontos</div></div></div>`);
    }
  }
  document.getElementById('rodadas').innerHTML = out.join('');
}

function renderChart(lista){
  // plota acumulado por rodada (0,1,2,3). Só quem tem algum ponto.
  const jogadores = lista.filter(p=>p.pontos>0).slice(0,10);
  if(!jogadores.length){ document.getElementById('chart').innerHTML='<div class="empty">O gráfico aparece quando começarem a pontuar.</div>'; document.getElementById('legend').innerHTML=''; return; }
  const W=640,H=260,pl=34,pr=14,pt=14,pb=28;
  const maxY=Math.max(3,...jogadores.map(p=>p.acumulado[3]||0));
  const xs=r=>pl+(W-pl-pr)*(r/3);
  const ys=v=>H-pb-(H-pt-pb)*(v/maxY);
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // grade
  for(let g=0;g<=maxY;g+=Math.max(1,Math.ceil(maxY/4))){
    svg+=`<line x1="${pl}" y1="${ys(g)}" x2="${W-pr}" y2="${ys(g)}" stroke="rgba(255,255,255,.06)"/>`;
    svg+=`<text x="${pl-6}" y="${ys(g)+3}" fill="#8892a4" font-size="9" text-anchor="end">${g}</text>`;
  }
  for(let r=0;r<=3;r++){svg+=`<text x="${xs(r)}" y="${H-10}" fill="#8892a4" font-size="9" text-anchor="middle">${r===0?'Início':'R'+r}</text>`;}
  const legend=[];
  jogadores.forEach((p,i)=>{
    const cor=`hsl(${(i*47)%360} 85% 62%)`;
    const pts=[0,1,2,3].map(r=>{const v=r===0?0:(p.acumulado[r]||0);return `${xs(r)},${ys(v)}`;}).join(' ');
    svg+=`<polyline points="${pts}" fill="none" stroke="${cor}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    [0,1,2,3].forEach(r=>{const v=r===0?0:(p.acumulado[r]||0);svg+=`<circle cx="${xs(r)}" cy="${ys(v)}" r="2.6" fill="${cor}"/>`;});
    legend.push(`<span><i style="background:${cor}"></i>${nc(p.nome)}</span>`);
  });
  svg+='</svg>';
  document.getElementById('chart').innerHTML=svg;
  document.getElementById('legend').innerHTML=legend.join('');
}

async function carregar(){
  try{
    const res=await fetch(SHEETS_URL); const d=await res.json();
    PARTICIPANTES=(d.participantes||[]).slice().sort((a,b)=>b.pontos-a.pontos);
    PALPITES=d.palpites||[]; JOGOS=d.jogos||[]; CUTOFF=d.cutoff||1;
    if(d.config&&d.config.titulo){document.getElementById('hero-title').textContent=d.config.titulo;document.getElementById('logo-text').textContent=d.config.titulo;}
    document.getElementById('loading').style.display='none';
    document.getElementById('conteudo').style.display='block';
    render();
  }catch(e){ document.getElementById('loading').innerHTML='<p style="color:var(--text-muted)">Erro ao carregar. Recarregue a página.</p>'; }
}
if(SHEETS_URL.startsWith('COLE_AQUI')){document.getElementById('loading').innerHTML='<p style="color:var(--text-muted)">Falta configurar a URL do script.</p>';}
else{ carregar(); setInterval(carregar,60000); }
</script>
