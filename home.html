<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classificação — Bolão Shuriks</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#FF2E9A;--gold-dark:#C01878;
  --bg:#0a0c10;--bg2:#12151c;--bg3:#1a1e28;--bg4:#222738;
  --border:rgba(255,46,154,0.18);--border-strong:rgba(255,46,154,0.4);
  --text:#f0f0f0;--text-muted:#8892a4;--text-dim:#555f72;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

.site-header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:900px;margin:0 auto;padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.hero-logo{width:100px;height:100px;border-radius:50%;object-fit:cover;margin:0 auto 14px;display:block;filter:drop-shadow(0 0 26px rgba(255,46,154,.4))}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1.5px;color:var(--gold)}
nav{display:flex;gap:4px}
nav a{color:var(--text-muted);text-decoration:none;font-size:12px;font-weight:500;padding:6px 11px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
nav a:hover,nav a.active{color:var(--gold);background:rgba(255,46,154,0.08)}
nav a.nav-bolao{border:1px solid var(--border);color:var(--gold)}

.hero{background:var(--bg2);border-bottom:1px solid var(--border);padding:34px 20px 30px;text-align:center}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,8vw,72px);letter-spacing:3px;color:var(--gold);line-height:1}
.hero-sub{font-family:'Oswald',sans-serif;font-size:14px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:6px}

.main{max-width:820px;margin:0 auto;padding:34px 18px 60px}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sec-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:3px;height:18px;background:var(--gold);border-radius:2px}
.sec-info{font-size:12px;color:var(--text-muted)}

.ranking{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.row{display:grid;grid-template-columns:52px auto 1fr auto;align-items:center;border-bottom:1px solid rgba(255,255,255,.04)}
.row:last-child{border:none}
.row.p1{background:linear-gradient(90deg,rgba(255,46,154,.07),transparent)}
.pos{font-family:'Bebas Neue',sans-serif;font-size:24px;text-align:center;color:var(--text-dim);padding:16px 0}
.row.p1 .pos{color:var(--gold)}
.row.p2 .pos{color:#C0C0C0}.row.p3 .pos{color:#CD7F32}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold);font-size:14px;overflow:hidden;margin:0 4px}
.avatar img{width:100%;height:100%;object-fit:cover}
.nome{font-family:'Oswald',sans-serif;font-size:16px;font-weight:500;padding:16px 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pts-wrap{text-align:right;padding:16px 20px 16px 10px}
.pts{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);line-height:1}
.pts-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}

.loading{text-align:center;padding:60px 20px;color:var(--text-muted)}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
footer{border-top:1px solid var(--border);text-align:center;padding:24px;font-size:12px;color:var(--text-dim)}
@media(max-width:520px){.row{grid-template-columns:40px auto 1fr auto}.pts{font-size:26px}.nome{font-size:14px}.nav-opt{display:none}}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="home.html"><img class="logo-img" src="shuriks-logo.png" alt="Shuriks"><div class="logo-text" id="logo-text">Bolão Shuriks</div></a>
    <nav>
      <a href="home.html" class="active">Classificação</a>
      <a href="index.html" class="nav-bolao">⚽ Bolão</a>
      <a href="palpites.html" class="nav-opt">🎯 Palpites</a>
    </nav>
  </div>
</header>

<section class="hero">
  <img class="hero-logo" src="shuriks-logo.png" alt="Shuriks">
  <div class="hero-eyebrow">Classificação Geral</div>
  <div class="hero-title" id="hero-title">Bolão Shuriks</div>
  <div class="hero-sub" id="hero-sub">Copa do Mundo 2026</div>
</section>

<div class="main">
  <div id="loading" class="loading"><div class="spinner"></div>Carregando classificação...</div>
  <div id="conteudo" style="display:none">
    <div class="sec-head">
      <div class="sec-title">Ranking</div>
      <div class="sec-info" id="sec-info"></div>
    </div>
    <div class="ranking" id="ranking"></div>
  </div>
</div>

<footer>Bolão da Copa 2026 · <strong style="color:var(--gold)">feito com Claude</strong></footer>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyr5fXwBeGQKntrZv4L6WjkCSCYG5d3rlIrV85_i_wO_VZpb-SVhRmub7aVYCj0KPMDtA/exec';
function initials(n){const p=n.trim().split(' ');return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function primeiroUltimo(n){const p=n.trim().split(' ');return p[0]+(p.length>1?' '+p[p.length-1]:'');}

function render(lista){
  const medals=['🥇','🥈','🥉'];
  document.getElementById('ranking').innerHTML = lista.map((p,i)=>{
    const av = p.foto ? `<img src="${p.foto}">` : initials(p.nome);
    const pos = medals[i] || (i+1)+'º';
    return `<div class="row p${i+1}">
      <div class="pos">${pos}</div>
      <div class="avatar">${av}</div>
      <div class="nome">${primeiroUltimo(p.nome)}</div>
      <div class="pts-wrap"><div class="pts">${p.pontos}</div><div class="pts-lbl">pontos</div></div>
    </div>`;
  }).join('');
  document.getElementById('sec-info').textContent = lista.length+' participantes';
}

async function carregar(){
  try{
    const res = await fetch(SHEETS_URL);
    const d = await res.json();
    let lista = (d.participantes||[]).slice().sort((a,b)=>b.pontos-a.pontos);
    if (d.config && d.config.titulo){
      document.getElementById('hero-title').textContent = d.config.titulo;
      document.getElementById('logo-text').textContent = d.config.titulo;
    }
    document.getElementById('loading').style.display='none';
    document.getElementById('conteudo').style.display='block';
    render(lista);
  }catch(e){
    document.getElementById('loading').innerHTML='<p style="color:var(--text-muted)">Erro ao carregar. Recarregue a página.</p>';
  }
}

if (SHEETS_URL.startsWith('COLE_AQUI')){
  document.getElementById('loading').innerHTML='<p style="color:var(--text-muted)">Falta configurar a URL do script no código.</p>';
} else {
  carregar();
  setInterval(carregar, 60000);
}
</script>
</body>
</html>
