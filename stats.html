<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estatísticas — Bolão Shuriks</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#FF2E9A;--gold-light:#FF6FC0;--gold-dark:#C01878;
  --bg:#0a0c10;--bg2:#12151c;--bg3:#1a1e28;--bg4:#222738;
  --border:rgba(255,46,154,0.18);--border-strong:rgba(255,46,154,0.4);
  --text:#f0f0f0;--text-muted:#8892a4;--text-dim:#555f72;--green:#22c55e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.site-header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:900px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:58px}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-img{width:38px;height:38px;border-radius:50%;object-fit:cover}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--gold)}
nav{display:flex;gap:2px}
nav a{color:var(--text-muted);text-decoration:none;font-size:11px;font-weight:600;padding:6px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
nav a:hover,nav a.active{color:var(--gold);background:rgba(255,46,154,0.08)}
nav a.nav-bolao{border:1px solid var(--border);color:var(--gold)}
.hero{background:var(--bg2);border-bottom:1px solid var(--border);padding:26px 20px;text-align:center}
.hero-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;filter:drop-shadow(0 0 24px rgba(255,46,154,.4))}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,6vw,52px);letter-spacing:3px;color:var(--gold)}
.main{max-width:820px;margin:0 auto;padding:24px 16px 60px}

.tabs{display:flex;gap:8px;margin-bottom:22px}
.tab{flex:1;text-align:center;padding:11px;border-radius:10px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;background:var(--bg3);color:var(--text-muted);border:1px solid transparent}
.tab.active{background:rgba(255,46,154,0.1);color:var(--gold);border-color:var(--border-strong)}

.sel{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:16px;font-family:'Inter',sans-serif}
.sel:focus{border-color:var(--border-strong)}

/* PERFIL */
.profile-head{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.ph-av{width:60px;height:60px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold);font-size:20px;overflow:hidden;border:2px solid var(--border)}
.ph-av img{width:100%;height:100%;object-fit:cover}
.ph-nome{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600}
.ph-pos{font-size:13px;color:var(--gold)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center}
.stat .v{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold);line-height:1}
.stat .l{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.bars{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:18px}
.bars h4{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-row .bl{font-size:12px;color:var(--text-muted);width:62px}
.bar-track{flex:1;height:14px;background:var(--bg4);border-radius:7px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));border-radius:7px}
.bar-row .bv{font-size:12px;color:var(--gold);width:40px;text-align:right;font-weight:600}

.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.badge{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:10px}
.badge.locked{opacity:.38;filter:grayscale(.6)}
.badge .ico{font-size:26px;line-height:1}
.badge .bt{font-size:13px;font-weight:600}
.badge .bd{font-size:11px;color:var(--text-muted);margin-top:2px;line-height:1.3}

/* CONFRONTO */
.vs-pick{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:20px}
.vs-x{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text-dim)}
.vs-board{background:var(--bg2);border:1px solid var(--border-strong);border-radius:16px;padding:20px;margin-bottom:16px}
.vs-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:18px}
.vs-p{text-align:center}
.vs-p .av{width:54px;height:54px;border-radius:50%;background:var(--bg4);margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold);font-size:17px;overflow:hidden}
.vs-p .av img{width:100%;height:100%;object-fit:cover}
.vs-p .nm{font-size:13px;font-weight:600}
.vs-score{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--gold);line-height:1}
.vs-mid{text-align:center}
.vs-mid .vlbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.cmp-row{display:grid;grid-template-columns:1fr 120px 1fr;align-items:center;gap:6px;padding:9px 0;border-top:1px solid rgba(255,255,255,.05)}
.cmp-row .cl{text-align:center;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.cmp-v{font-family:'Bebas Neue',sans-serif;font-size:22px;text-align:center}
.cmp-v.win{color:var(--gold)}.cmp-v.lose{color:var(--text-dim)}
.h2h-note{font-size:12px;color:var(--text-muted);text-align:center;margin-top:6px}

.loading{text-align:center;padding:60px 20px;color:var(--text-muted)}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--text-muted);padding:24px;font-size:13px}
footer{border-top:1px solid var(--border);text-align:center;padding:24px;font-size:12px;color:var(--text-dim)}
@media(max-width:520px){.stat-grid{grid-template-columns:repeat(2,1fr)}.nav-opt{display:none}}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="home.html"><img class="logo-img" src="shuriks-logo.png" alt="Shuriks"><div class="logo-text" id="logo-text">Bolão Shuriks</div></a>
    <nav>
      <a href="home.html" class="nav-opt">Classif.</a>
      <a href="index.html" class="nav-bolao">⚽ Bolão</a>
      <a href="palpites.html" class="nav-opt">🎯 Palpites</a>
      <a href="stats.html" class="active">📊 Stats</a>
      <a href="perfil.html" class="nav-opt">👤 Perfil</a>
    </nav>
  </div>
</header>
<section class="hero">
  <img class="hero-logo" src="shuriks-logo.png" alt="Shuriks">
  <div class="hero-title">Estatísticas</div>
</section>

<div class="main">
  <div id="loading" class="loading"><div class="spinner"></div>Carregando...</div>
  <div id="conteudo" style="display:none">
    <div class="tabs">
      <div class="tab active" id="tab-perfil" onclick="trocar('perfil')">Perfil</div>
      <div class="tab" id="tab-vs" onclick="trocar('vs')">Confronto direto</div>
    </div>

    <div id="painel-perfil">
      <select class="sel" id="sel-perfil" onchange="renderPerfil()"></select>
      <div id="perfil"></div>
    </div>

    <div id="painel-vs" style="display:none">
      <div class="vs-pick">
        <select class="sel" id="sel-a" style="margin:0" onchange="renderVS()"></select>
        <div class="vs-x">×</div>
        <select class="sel" id="sel-b" style="margin:0" onchange="renderVS()"></select>
      </div>
      <div id="vs"></div>
    </div>
  </div>
</div>
<footer>Bolão Shuriks · <strong style="color:var(--gold)">feito com Claude</strong></footer>

<script src="medals.js"></script>
<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyr5fXwBeGQKntrZv4L6WjkCSCYG5d3rlIrV85_i_wO_VZpb-SVhRmub7aVYCj0KPMDtA/exec';
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fotoSafe(f){f=String(f||'');return /^data:image\//.test(f)||/^https:\/\//.test(f)?f:'';}
function initials(n){const p=String(n||'').trim().split(' ');return ((p[0][0]||'?')+(p[1]?p[1][0]:'')).toUpperCase();}
function nomeCurto(n){const p=String(n||'').trim().split(' ');return p[0]+(p.length>1?' '+p[p.length-1]:'');}
function avHtml(p){const f=fotoSafe(p.foto);return f?`<img src="${f}">`:esc(initials(p.nome));}

let PARTICIPANTES=[], PALPITES=[], JOGOS=[];

function trocar(t){
  document.getElementById('tab-perfil').classList.toggle('active',t==='perfil');
  document.getElementById('tab-vs').classList.toggle('active',t==='vs');
  document.getElementById('painel-perfil').style.display = t==='perfil'?'block':'none';
  document.getElementById('painel-vs').style.display = t==='vs'?'block':'none';
}

function posDe(nome){return PARTICIPANTES.findIndex(p=>p.nome===nome)+1;}

let CTX=null;

// ── PERFIL ──
function renderPerfil(){
  const nome=document.getElementById('sel-perfil').value;
  const p=PARTICIPANTES.find(x=>x.nome===nome);
  if(!p){document.getElementById('perfil').innerHTML='';return;}
  const rod=p.rodada||{1:0,2:0,3:0};
  const maxR=Math.max(1,rod[1],rod[2],rod[3]);
  const barras=[1,2,3].map(r=>`<div class="bar-row"><div class="bl">Rodada ${r}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round((rod[r]/maxR)*100)}%"></div></div>
    <div class="bv">${rod[r]} pts</div></div>`).join('');
  const meds=(CTX?calcularMedalhas(p,CTX):[]).slice().sort((a,b)=>(b.ok?1:0)-(a.ok?1:0));
  const cq=meds.map(b=>`<div class="badge ${b.ok?'':'locked'}"><div class="ico">${b.ico}</div>
    <div><div class="bt">${b.t}</div><div class="bd">${b.d}</div></div></div>`).join('');

  document.getElementById('perfil').innerHTML=`
    <div class="profile-head">
      <div class="ph-av">${avHtml(p)}</div>
      <div><div class="ph-nome">${esc(nomeCurto(p.nome))}</div><div class="ph-pos">${posDe(p.nome)}º lugar no bolão</div></div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="v">${p.pontos}</div><div class="l">Pontos</div></div>
      <div class="stat"><div class="v">${p.cravadas||0}</div><div class="l">Cravadas</div></div>
      <div class="stat"><div class="v">${p.acertos||0}</div><div class="l">Acertos</div></div>
      <div class="stat"><div class="v">${p.aproveitamento||0}%</div><div class="l">Aproveit.</div></div>
    </div>
    <div class="bars"><h4>Pontos por rodada</h4>${barras}</div>
    <div class="badges">${cq}</div>`;
}

// ── CONFRONTO DIRETO ──
function renderVS(){
  const na=document.getElementById('sel-a').value, nb=document.getElementById('sel-b').value;
  const A=PARTICIPANTES.find(x=>x.nome===na), B=PARTICIPANTES.find(x=>x.nome===nb);
  if(!A||!B||na===nb){document.getElementById('vs').innerHTML='<div class="empty">Escolha dois participantes diferentes.</div>';return;}

  // head-to-head jogo a jogo (jogos que valeram ponto e os dois palpitaram)
  const palA={},palB={};
  PALPITES.forEach(pl=>{ if(pl.nome===na) palA[pl.jogo]=pl; if(pl.nome===nb) palB[pl.jogo]=pl; });
  let vitA=0,vitB=0,emp=0;
  JOGOS.forEach(j=>{
    if(j.placar1===null||j.placar2===null) return;
    const a=palA[j.num], b=palB[j.num];
    if(!a||!b) return;
    if(a.pontos>b.pontos) vitA++; else if(b.pontos>a.pontos) vitB++; else emp++;
  });

  const linha=(lbl,va,vb,inv)=>{
    const aWin = inv? va<vb : va>vb, bWin = inv? vb<va : vb>va;
    return `<div class="cmp-row">
      <div class="cmp-v ${aWin?'win':'lose'}">${va}</div>
      <div class="cl">${lbl}</div>
      <div class="cmp-v ${bWin?'win':'lose'}">${vb}</div></div>`;
  };

  document.getElementById('vs').innerHTML=`
    <div class="vs-board">
      <div class="vs-top">
        <div class="vs-p"><div class="av">${avHtml(A)}</div><div class="nm">${esc(nomeCurto(A.nome))}</div></div>
        <div class="vs-mid"><div class="vs-score">${vitA} - ${vitB}</div><div class="vlbl">rivalidade</div></div>
        <div class="vs-p"><div class="av">${avHtml(B)}</div><div class="nm">${esc(nomeCurto(B.nome))}</div></div>
      </div>
      ${linha('Pontos',A.pontos,B.pontos)}
      ${linha('Cravadas',A.cravadas||0,B.cravadas||0)}
      ${linha('Aproveit. %',A.aproveitamento||0,B.aproveitamento||0)}
      ${linha('Posição',posDe(A.nome),posDe(B.nome),true)}
      <div class="h2h-note">Rivalidade = jogos já encerrados em que os dois palpitaram (${vitA+vitB+emp} jogo(s), ${emp} empate(s)).</div>
    </div>`;
}

function preencherSelects(){
  const opts=PARTICIPANTES.map(p=>`<option value="${esc(p.nome)}">${esc(nomeCurto(p.nome))}</option>`).join('');
  document.getElementById('sel-perfil').innerHTML=opts;
  document.getElementById('sel-a').innerHTML=opts;
  document.getElementById('sel-b').innerHTML=opts;
  if(PARTICIPANTES[1]) document.getElementById('sel-b').selectedIndex=1;
}

async function carregar(){
  try{
    const res=await fetch(SHEETS_URL); const d=await res.json();
    PARTICIPANTES=(d.participantes||[]).slice().sort((a,b)=>b.pontos-a.pontos);
    PALPITES=d.palpites||[]; JOGOS=d.jogos||[];
    CTX=buildMedalCtx(PARTICIPANTES,PALPITES,JOGOS,d.cutoff||1);
    if(d.config&&d.config.titulo)document.getElementById('logo-text').textContent=d.config.titulo;
    document.getElementById('loading').style.display='none';
    if(!PARTICIPANTES.length){document.getElementById('conteudo').innerHTML='<div class="empty">Ainda não há participantes cadastrados.</div>';document.getElementById('conteudo').style.display='block';return;}
    document.getElementById('conteudo').style.display='block';
    preencherSelects(); renderPerfil(); renderVS();
  }catch(e){ document.getElementById('loading').innerHTML='<p style="color:var(--text-muted)">Erro ao carregar. Recarregue.</p>'; }
}
if(SHEETS_URL.startsWith('COLE_AQUI')){document.getElementById('loading').innerHTML='<p style="color:var(--text-muted)">Falta configurar a URL do script.</p>';}
else{ carregar(); setInterval(carregar,60000); }
</script>
</body>
</html>
